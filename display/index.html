<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Waiting Display</title>
<link rel="stylesheet" href="../shared/style.css">
<style>
body { overflow: auto; }
[dir="rtl"] { font-family: 'Noto Nastaliq Urdu', 'Segoe UI', sans-serif; }
</style>
</head>
<body>
<div id="soundOverlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.85); color:#fff; display:flex; align-items:center; justify-content:center; z-index:999; cursor:pointer; font-size:24px; text-align:center;" onclick="enableDisplaySound()">
  🔊 Click to enable sound alerts
</div>
<div class="display-layout" id="layout">
  <div class="next-list">
    <h2 id="nextTitle">Tokens next in line</h2>
    <div id="nextItems"></div>
  </div>
  <div class="current-panel" id="currentPanel">
    <img class="logo" src="../shared/logo.jpg">
    <div class="title" id="orgTitle"><span class="green">Pakistan</span> Embassy</div>
    <div class="big-box">
      <div id="currentLabel">Current token being called</div>
      <div class="big-num" id="currentNum">-</div>
      <div id="counterLabel" style="font-size:20px;margin-top:12px;"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/supabase.js"></script>
<script>
  const text = {
    en: {
      dir: 'ltr',
      nextTitle: 'Tokens next in line',
      currentLabel: 'Current token being called',
      next: 'Next',
      orgTitleGreen: 'Pakistan',
      orgTitleRest: 'Embassy',
      proceed: (desk) => `Proceed to ${desk} Desk`
    },
    ur: {
      dir: 'rtl',
      nextTitle: 'اگلے نمبر پر آنے والے ٹوکنز',
      currentLabel: 'موجودہ ٹوکن جسے بلایا جا رہا ہے',
      next: 'اگلا',
      orgTitleGreen: 'پاکستانی',
      orgTitleRest: 'سفارت خانہ',
      proceed: (desk) => `براہ کرم ${desk} پر جائیں`
    }
  };

  const deskNames = {
    'NADRA': { en: 'NADRA', ur: 'نادرا ڈیسک' },
    'Passport Section': { en: 'Passport', ur: 'پاسپورٹ ڈیسک' },
    'Consular section': { en: 'Consular', ur: 'قونصلر ڈیسک' },
    'Welfare Wing': { en: 'Welfare', ur: 'ویلفیئر ڈیسک' },
    'Special Visit / Other': { en: 'Meeting Room', ur: 'میٹنگ روم' }
  };

  let lang = 'en';
  let soundEnabled = false;
  let audioCtx = null;
  let lastCalledNumber = null;

  function enableDisplaySound() {
    soundEnabled = true;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.getElementById('soundOverlay').style.display = 'none';
  }






  


function playChime() {
    if (!soundEnabled || !audioCtx) return;

    const now = audioCtx.currentTime;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.type = "triangle";      // Softer than sine
    osc.frequency.value = 560;  // Pleasant hospital notification tone

    gain.gain.setValueAtTime(0.001, now);
    gain.gain.exponentialRampToValueAtTime(0.25, now + 0.10);
    gain.gain.exponentialRampToValueAtTime(0.18, now + 0.60);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.8);

    osc.start(now);
    osc.stop(now + 1.8);
}

// Speaks the token number + desk to proceed to, in English then Urdu,
// so both language speakers hear it regardless of which language the
// screen currently shows.
function announceToken(number, deskInfo) {
    if (!soundEnabled || !('speechSynthesis' in window)) return;

    window.speechSynthesis.cancel();

    const deskEn = deskInfo ? deskInfo.en : null;
    const deskUr = deskInfo ? deskInfo.ur : null;

    const enText = deskEn
      ? `Now calling token ${number}. Please proceed to ${deskEn} desk.`
      : `Now calling token ${number}.`;
    const urText = deskUr
      ? `اب ٹوکن ${number} کو بلایا جا رہا ہے۔ براہ کرم ${deskUr} پر جائیں۔`
      : `اب ٹوکن ${number} کو بلایا جا رہا ہے۔`;

    const uEn = new SpeechSynthesisUtterance(enText);
    uEn.lang = 'en-US';
    uEn.rate = 0.95;

    const uUr = new SpeechSynthesisUtterance(urText);
    uUr.lang = 'ur-PK';
    uUr.rate = 0.9;

    uEn.onend = () => window.speechSynthesis.speak(uUr);
    window.speechSynthesis.speak(uEn);
}





  async function loadDisplay() {
    const { data: departments } = await supabaseClient.from('departments').select('*');
    const deptMap = {};
    (departments || []).forEach(d => deptMap[d.id] = d);

    const { data: calling } = await supabaseClient.from('tokens').select('*').eq('status', 'calling').order('called_at', { ascending: false }).limit(1);
    const { data: pending } = await supabaseClient.from('tokens').select('*').eq('status', 'pending').order('priority_order', { ascending: true }).order('id', { ascending: true }).limit(4);

    const t = text[lang];
    document.getElementById('layout').setAttribute('dir', t.dir);
    document.getElementById('nextTitle').textContent = t.nextTitle;
    document.getElementById('currentLabel').textContent = t.currentLabel;
    document.getElementById('orgTitle').innerHTML = `<span class="green">${t.orgTitleGreen}</span> ${t.orgTitleRest}`;

    const newNumber = calling && calling.length ? calling[0].number : null;
    const dept = calling && calling.length ? deptMap[calling[0].department_id] : null;
    const deskInfo = dept ? (deskNames[dept.name] || { en: dept.name, ur: dept.name }) : null;

    if (newNumber && newNumber !== lastCalledNumber) {
      playChime();
      setTimeout(() => announceToken(newNumber, deskInfo), 1200);
    }
    lastCalledNumber = newNumber;
    document.getElementById('currentNum').textContent = newNumber || '-';

    if (dept) {
      const deskLabel = lang === 'en' ? deskInfo.en : deskInfo.ur;
      document.getElementById('counterLabel').textContent = lang === 'en'
        ? `Proceed to ${deskLabel} Desk`
        : t.proceed(deskLabel);
    } else {
      document.getElementById('counterLabel').textContent = '';
    }

    const nextContainer = document.getElementById('nextItems');
    nextContainer.innerHTML = '';
    (pending || []).forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'next-item';

      div.innerHTML = `<span>${p.number}</span>${i === 0 ? `<span style="font-size:clamp(16px, 2.5vw, 28px);">${t.next}</span>` : ''}`;

      nextContainer.appendChild(div);
    });
  }

  setInterval(() => {
    lang = lang === 'en' ? 'ur' : 'en';
    loadDisplay();
  }, 8000);

  supabaseClient
    .channel('display-tokens')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'tokens' }, loadDisplay)
    .subscribe();

  loadDisplay();
</script>
</body>
</html>
