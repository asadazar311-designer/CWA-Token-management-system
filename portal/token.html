<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Token</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <div class="dark-bg">
    <div class="card">
      <img class="logo" src="../shared/logo.jpg" alt="logo">
      <div class="title"><span class="green">Pakistan</span> Embassy Kuwait</div>
      <p class="subtitle" id="deptName">Department token</p>

      <div class="status-box" id="statusBox">
        <div class="status-label" id="statusLabel">Loading...</div>
        <div class="token-number" id="tokenNumber">-</div>
        <div class="status-note" id="statusNote"></div>
        <div class="status-note" id="statusNoteUr" style="direction:rtl; margin-top:4px;"></div>
        <div class="status-note" id="deskNote" style="margin-top:8px; font-weight:700;"></div>
        <div class="status-note" id="deskNoteUr" style="direction:rtl; font-weight:700;"></div>
        <div class="status-note" id="currentServingNote" style="margin-top:6px;"></div>
      </div>

      <div id="clock" class="status-icon">🕒</div>
      <div id="loudspeaker" class="status-icon">📢</div>
      <div id="checkmark" class="status-icon">✅</div>
      <div id="dismissedIcon" class="status-icon">❌</div>

      <button id="enableAlertsBtn" onclick="enableAlerts()" class="btn btn-blue" style="margin-top:16px;">🔔 Enable Sound Alerts</button>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../shared/supabase.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const tokenId = params.get('id');

    const departmentName = params.get('dept') || '';
    const departmentDisplayName = departmentName === 'Welfare Wing'
      ? 'Welfare Wing Man Power'
      : departmentName;
    document.getElementById('deptName').textContent =
      departmentDisplayName + ' token';

    const deskNames = {
      'NADRA': { en: 'NADRA', ur: 'نادرا ڈیسک' },
      'Passport Section': { en: 'Passport', ur: 'پاسپورٹ ڈیسک' },
      'Consular section': { en: 'Consular', ur: 'قونصلر ڈیسک' },
      'Welfare Wing': { en: 'Welfare Wing Man Power', ur: 'ویلفیئر ڈیسک' },
      'Special Visit / Other': { en: 'Meeting Room', ur: 'میٹنگ روم' }
    };

    let hasNotified = false;
    let alertsEnabled = false;
    let sharedAudioCtx = null;

    function enableAlerts() {
      alertsEnabled = true;
      sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();

      const osc = sharedAudioCtx.createOscillator();
      const gain = sharedAudioCtx.createGain();
      osc.connect(gain);
      gain.connect(sharedAudioCtx.destination);
      gain.gain.setValueAtTime(0.01, sharedAudioCtx.currentTime);
      osc.start();
      osc.stop(sharedAudioCtx.currentTime + 0.05);

      if (navigator.vibrate) navigator.vibrate(50);

      document.getElementById('enableAlertsBtn').textContent = '🔔 Alerts Enabled';
      document.getElementById('enableAlertsBtn').disabled = true;
    }

    function notifyCalled() {
      if (hasNotified || !alertsEnabled) return;
      hasNotified = true;

      if (navigator.vibrate) {
        navigator.vibrate([200, 100, 200]);
      }

      try {
        const oscillator = sharedAudioCtx.createOscillator();
        const gainNode = sharedAudioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(sharedAudioCtx.destination);
        oscillator.frequency.value = 758;
        gainNode.gain.setValueAtTime(0.3, sharedAudioCtx.currentTime);// Set initial volume
        gainNode.gain.exponentialRampToValueAtTime(0.001, sharedAudioCtx.currentTime + 0.9);// Fade out over 0.6 seconds
        oscillator.start();
        oscillator.stop(sharedAudioCtx.currentTime + 0.9);// Stop after 0.6 seconds
      } catch (e) {
        console.log('Audio not available:', e);
      }
    }

    function render(token) {

      document.getElementById('tokenNumber').textContent = token.number;

      // Once the token is finished, clear the stored reference so the customer
      // can take a new one from the portal if they want.
      if (token.status === 'processed' || token.status === 'dismissed') {
        try { localStorage.removeItem('qms_active_token'); } catch {}
      }

      const box = document.getElementById('statusBox');
      const label = document.getElementById('statusLabel');
      const note = document.getElementById('statusNote');
      const noteUr = document.getElementById('statusNoteUr');
      const deskNote = document.getElementById('deskNote');
      const deskNoteUr = document.getElementById('deskNoteUr');

      const clock = document.getElementById('clock');
      const speaker = document.getElementById('loudspeaker');
      const checkmark = document.getElementById('checkmark');
      const dismissedIcon = document.getElementById('dismissedIcon');

      box.className = 'status-box ' + token.status;

      clock.style.display = 'none';
      speaker.style.display = 'none';
      checkmark.style.display = 'none';
      dismissedIcon.style.display = 'none';
      deskNote.textContent = '';
      deskNoteUr.textContent = '';

      const deptDisplayName = params.get('dept') || '';
      const desk = deskNames[deptDisplayName];

      if (token.status === 'pending') {

        label.textContent = 'Your token number is';
        note.textContent = 'Please wait for your token to be called';
        noteUr.textContent = 'براہ کرم اپنے ٹوکن کے بلائے جانے کا انتظار کریں';
        clock.style.display = 'block';

      } else if (token.status === 'calling') {

        label.textContent = 'Your token number is';
        note.textContent = 'Your token is being called';
        noteUr.textContent = 'آپ کا ٹوکن بلایا جا رہا ہے';
        speaker.style.display = 'block';
        if (desk) {
          deskNote.textContent = `Proceed to ${desk.en} Desk`;
          deskNoteUr.textContent = `براہ کرم ${desk.ur} پر جائیں`;
        }
        notifyCalled();

      } else if (token.status === 'processed') {

        label.textContent = 'Your token has been processed';
        note.textContent = 'You may now close the application';
        noteUr.textContent = 'اب آپ ایپلیکیشن بند کر سکتے ہیں';
        checkmark.style.display = 'block';

      } else if (token.status === 'dismissed') {

        label.textContent = 'Your token has been dismissed';
        note.textContent = 'You did not respond to your token call. Please take another token.';
        noteUr.textContent = 'آپ نے اپنے ٹوکن کال کا جواب نہیں دیا۔ براہ کرم دوبارہ ٹوکن حاصل کریں۔';
        dismissedIcon.style.display = 'block';

      }

    }

    async function loadCurrentServing(deptId) {

      const { data } = await supabaseClient
        .from('tokens')
        .select('*')
        .eq('department_id', deptId)
        .eq('status', 'calling')
        .limit(1);

      const note = document.getElementById('currentServingNote');

      if (data && data.length && data[0].id != tokenId) {
        note.textContent = `Current token No: ${data[0].number}`;
      } else {
        note.textContent = '';
      }
    }

    let currentDeptId = null;

    async function loadToken() {

      const { data, error } = await supabaseClient
        .from('tokens')
        .select('*')
        .eq('id', tokenId)
        .single();

      if (error) {
        console.error(error);
        return;
      }

      render(data);
      currentDeptId = data.department_id;
      loadCurrentServing(currentDeptId);
    }

    supabaseClient
      .channel('token-' + tokenId)
      .on(
        'postgres_changes',
        {
          event: 'UPDATE',
          schema: 'public',
          table: 'tokens',
          filter: `id=eq.${tokenId}`
        },
        (payload) => render(payload.new)
      )
      .subscribe();

    supabaseClient
      .channel('dept-calling-updates')
      .on(
        'postgres_changes',
        {
          event: '*',
          schema: 'public',
          table: 'tokens'
        },
        (payload) => {
          if (
            currentDeptId &&
            payload.new &&
            payload.new.department_id === currentDeptId
          ) {
            loadCurrentServing(currentDeptId);
          }
        }
      )
      .subscribe();

    loadToken();

  </script>
</body>
</html>
