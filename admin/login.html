<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>
<link rel="stylesheet" href="../shared/style.css">
</head>
<body>
  <div class="dark-bg">
    <div class="card">
      <img class="logo" src="../shared/logo.jpg" alt="logo">
      <div class="title"><span class="green">Pakistan</span> Embassy Kuwait</div>
      <p class="subtitle">Passport/Nadra/Council/Welfare<br>Token Dashboard Login</p>

      <label>Username</label>
      <input type="email" id="email" placeholder="Enter Username">
      <label>Password</label>
      <input type="password" id="password" placeholder="At least 8 characters">
      <button class="btn btn-green" onclick="login()">Log in</button>
      <p id="err" style="color:#eb5757; font-size:13px; margin-top:10px;"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../shared/supabase.js"></script>
  <script>
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) {
        document.getElementById('err').textContent = 'Invalid username or password.';
        return;
      }
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
