<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pakistan Embassy Kuwait - Token Portal</title>
<link rel="stylesheet" href="shared/style.css">
</head>
<body>
  <div class="dark-bg">
    <div class="card">
      <img class="logo" src="shared/logo.jpg" alt="logo">
      <div class="title"><span class="green">Pakistan</span> Embassy Kuwait</div>
      <p class="subtitle"><span style="font-size: 24px; font-weight: bold;">Scan QR code below to receive token number</span></p>
      <div id="qr" style="display:flex;justify-content:center;margin-top:12px;"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

  <script>
    async function loadQRCode() {

      const { data, error } = await supabaseClient
        .from('settings')
        .select('portal_url')
        .limit(1)
        .maybeSingle();

      if (error) {
        console.error(error);
        return;
      }

      const portalUrl = data?.portal_url || (window.location.origin + "/portal/");

      const qrContainer = document.getElementById('qr');
      qrContainer.innerHTML = '';

      const canvas = document.createElement('canvas');

      QRCode.toCanvas(canvas, portalUrl, { width: 220 }, function(err) {
        if (err) {
          console.error(err);
          return;
        }

        qrContainer.appendChild(canvas);
      });
    }

    loadQRCode();

    // Automatically update the QR code if the admin changes the URL
    supabaseClient
      .channel('settings-updates')
      .on(
        'postgres_changes',
        {
          event: 'UPDATE',
          schema: 'public',
          table: 'settings'
        },
        () => loadQRCode()
      )
      .subscribe();

  </script>
</body>
</html>
